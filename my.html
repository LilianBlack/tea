<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta property="og:description" content="智能温度显示 / 长效保温 / 喝水提醒 / 316L不锈钢 / 无线充电">
  <meta property="og:image" content="https://fakeimg.pl/600x600/0288d1/ffffff?text=iHealth+Cup&font=noto&font_size=40">
  <meta property="og:image:width" content="600">
  <meta property="og:image:height" content="600">
  <meta property="og:url" content="https://你的域名.com/ishare-cup">  <!-- 上线前请替换为实际完整域名+路径 -->
  <meta property="og:type" content="product">
  <meta property="og:locale" content="zh_CN">
  <meta property="product:brand" content="iHealth">
  <meta property="product:availability" content="in stock">
  
  <!-- 微信内置浏览器也会参考twitter卡片，同时加上 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="iHealth 智能随行杯 · 私人饮水管家">
  <meta name="twitter:description" content="智能温度显示 / 长效保温 / 喝水提醒 / 316L不锈钢 / 无线充电">
  <meta name="twitter:image" content="https://fakeimg.pl/600x600/0288d1/ffffff?text=iHealth+Cup&font=noto&font_size=40">
  
  <!-- 样式：纯净移动优先，卡片设计 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      margin: 0;
    }

    .product-card {
      max-width: 420px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -8px rgba(0, 35, 70, 0.15);
      padding: 24px 22px 32px;
      transition: transform 0.2s ease;
    }

    .product-gallery {
      background: #f0f4f9;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .product-gallery img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      background: #e6edf5;
    }

    .product-title {
      font-size: 30px;
      font-weight: 700;
      color: #0b1e33;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .product-price {
      font-size: 28px;
      font-weight: 650;
      color: #1e6df2;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .product-price span {
      font-size: 16px;
      font-weight: 400;
      color: #68788c;
      margin-left: 6px;
    }

    .product-desc {
      background: #f7f9fc;
      border-radius: 20px;
      padding: 18px 18px 14px;
      margin-bottom: 28px;
      border-left: 5px solid #1e6df2;
      font-size: 15px;
      line-height: 1.65;
      color: #1e2f44;
    }

    .product-desc p {
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .product-desc .icon {
      display: inline-block;
      width: 20px;
      text-align: center;
      color: #1e6df2;
      font-weight: 600;
    }

    .qr-block {
      background: #f2f6fe;
      border-radius: 26px;
      padding: 24px 18px 18px;
      text-align: center;
      border: 1px dashed #a0c3ff;
    }

    .qr-label {
      font-size: 16px;
      font-weight: 580;
      color: #0b2d5c;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .qr-label i {
      font-size: 20px;
    }

    #qr-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
    }

    #qr-container img {
      width: 170px;
      height: 170px;
      border-radius: 20px;
      background: white;
      padding: 8px;
      box-shadow: 0 8px 18px rgba(0, 40, 100, 0.12);
      transition: transform 0.1s;
    }

    .qr-hint {
      font-size: 13px;
      color: #46648c;
      background: #e9effa;
      padding: 6px 12px;
      border-radius: 30px;
      display: inline-block;
      margin-top: 6px;
    }

    .footer-note {
      margin-top: 18px;
      color: #7f8fa4;
      font-size: 12px;
      text-align: center;
      border-top: 1px solid #eef2f6;
      padding-top: 16px;
    }
  </style>
</head>
<body>
  <div class="product-card">
    <!-- 产品主图（确保与分享图片一致或相似） -->
    <div class="product-gallery">
      <img src="https://fakeimg.pl/600x600/0288d1/ffffff?text=iHealth+Cup&font=noto&font_size=40" 
           alt="iHealth 智能随行杯 产品展示"
           width="600" height="600">
    </div>

    <!-- 产品名称 -->
    <h1 class="product-title">iHealth 智能随行杯</h1>
    
    <!-- 价格信息 -->
    <div class="product-price">
      ¥ 239 <span>| 建议零售价</span>
    </div>

    <!-- 产品卖点/描述（结构化展示，对分享描述也形成补充） -->
    <div class="product-desc">
      <p><span class="icon">⚡</span> 智能温度显示 · 触控感应</p>
      <p><span class="icon">💧</span> 高频饮水提醒 · APP记录</p>
      <p><span class="icon">🔋</span> 无线充电底座 · 超长续航</p>
      <p><span class="icon">🧊</span> 316L不锈钢内胆 · 保温24h</p>
    </div>

    <!-- 二维码分享区域：用户可截图/保存二维码分享，朋友扫码即达本页 -->
    <div class="qr-block">
      <div class="qr-label">
        <span>📲 扫码直达产品</span>
        <span style="font-size:14px; background:#d9e6ff; padding:4px 10px; border-radius:40px;">分享有礼</span>
      </div>
      <!-- 二维码动态生成容器 -->
      <div id="qr-container"></div>
      <div class="qr-hint">长按二维码保存，或截屏发送给好友</div>
    </div>

    <div class="footer-note">
      iHealth · 让每一口水都恰到好处
    </div>
  </div>

  <!-- 引入轻量级二维码生成库 (qrcode-generator) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    (function() {
      // 确保二维码库加载完成
      if (typeof qrcodeGenerator === 'undefined') {
        console.warn('二维码库未加载，请刷新');
        return;
      }

      // 获取当前页面完整URL（去掉hash部分，保证干净）
      let currentUrl = window.location.href.split('#')[0];
      
      // 若URL非常长（微信可能会加参数），二维码仍可识别，但可以限制长度。这里不做截断。
      try {
        // 创建二维码对象：类型编号，纠错等级M
        var qr = qrcodeGenerator(0, 'M');
        qr.addData(currentUrl);
        qr.make();

        // 生成图片标签 (参数：单元格大小像素，边框大小)
        var imgTag = qr.createImgTag(6, 2);  // 6px/单元格，边框2单元格
        var container = document.getElementById('qr-container');
        container.innerHTML = imgTag;

        // 获取刚插入的img并添加样式 (确保显示完美)
        var qrImg = container.querySelector('img');
        if (qrImg) {
          // 移除可能的内联宽高，我们用css控制
          qrImg.style.width = '170px';
          qrImg.style.height = '170px';
          qrImg.style.borderRadius = '16px';
          qrImg.style.background = '#ffffff';
          // 部分安卓下图片模糊，强制设定像素尺寸
          qrImg.setAttribute('width', '170');
          qrImg.setAttribute('height', '170');
        }
      } catch (e) {
        console.error('二维码生成失败', e);
        document.getElementById('qr-container').innerHTML = '<div style="padding:20px;background:#eee;">二维码生成失败</div>';
      }

      // ------- 以下为微信分享增强 (若想完全自定义标题/图，可启用后端签名，但此处使用OG已足够) -------
      // 为了更好兼容，当检测到微信内置浏览器时，可以预先填充一些meta（动态meta对爬虫无效，但对微信内分享跳转有帮助？实际上大部分情况静态og已经工作）
      // 但为了满足"微信聊天框中展示基础信息如名称图片"，静态og是主流做法，微信会主动爬取。
      // 若您有微信服务号并已绑定安全域名，可以取消下面注释并实现后端签名。
      /*
      if (/micromessenger/i.test(navigator.userAgent)) {
        // 动态加载微信JS-SDK (可选，用于主动触发分享数据，但需要后端获取签名)
        var wxScript = document.createElement('script');
        wxScript.src = 'https://res.wx.qq.com/open/js/jweixin-1.6.0.js';
        wxScript.onload = function() {
          // 这里需要通过ajax请求自己的后端获取签名，例如：
          // fetch('/wechat/signature?url=' + encodeURIComponent(location.href.split('#')[0]))
          //   .then(res => res.json())
          //   .then(data => {
          //       wx.config({...});
          //       wx.ready(function() {
          //           wx.updateAppMessageShareData({ 
          //               title: 'iHealth 智能随行杯', 
          //               desc: '智能温度显示 / 喝水提醒 / 316L不锈钢', 
          //               link: location.href.split('#')[0], 
          //               imgUrl: 'https://fakeimg.pl/600x600/0288d1/ffffff?text=iHealth+Cup' 
          //           });
          //       });
          //   });
        };
        document.head.appendChild(wxScript);
      }
      */

      // 另注：Open Graph中og:url建议替换为线上真实域名，否则可能被微信缓存错误地址。
      // 如果您将此页面部署在正式域名下，请手动修改head中og:url的content。
    })();
  </script>

  <!-- 确保og:url与当前地址一致（如果部署时忘记替换，可用js动态更新，但爬虫不执行。此处仅在控制台提示） -->
  <script>
    (function() {
      // 友善提示：部署前记得修改og:url为真实域名
      var metaOgUrl = document.querySelector('meta[property="og:url"]');
      if (metaOgUrl && metaOgUrl.content && metaOgUrl.content.indexOf('你的域名') !== -1) {
        console.log('提示: 请将 <meta property="og:url" content="..."> 替换为实际完整域名+路径，以便微信正确抓取。');
      }
    })();
  </script>

  <!-- 附加说明：产品图使用的 fakeimg 服务稳定，返回带文字图片，可放心用于分享缩略图。若想替换为真实产品图，直接更改og:image和img src即可。 -->
</body>
</html>
